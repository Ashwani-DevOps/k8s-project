name: Security Scan and Build

on:
  push:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Gate 1: Python Code Scan
      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r app.py -f json -o bandit-report.json || true
        continue-on-error: true

      # Gate 2: Vulnerability Scan of the Dockerfile/Image
      - name: Build local image for scanning
        run: docker build -t hello-ashwani:test .

      - name: Trivy Scan (Container Security)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hello-ashwani:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'  # Fail on CRITICAL/HIGH
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'